<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Expense</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1152d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-[#111318] dark:text-white transition-colors duration-200">
<div class="relative flex h-screen w-full max-w-md mx-auto flex-col bg-white dark:bg-background-dark shadow-xl overflow-hidden">
<!-- Top App Bar -->
<div class="flex items-center bg-white dark:bg-background-dark p-4 pb-2 justify-between border-b border-gray-100 dark:border-gray-800">
<div class="text-[#111318] dark:text-white flex size-10 shrink-0 items-center justify-center cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full">
<span class="material-symbols-outlined">close</span>
</div>
<h2 class="text-[#111318] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Add Expense</h2>
<div class="flex w-10 items-center justify-end">
<button class="flex items-center justify-center text-primary">
<span class="material-symbols-outlined">history</span>
</button>
</div>
</div>
<!-- Scrollable Content Area -->
<div class="flex-1 overflow-y-auto no-scrollbar pb-24">
<!-- Amount Input Section -->
<div class="flex flex-col items-center justify-center py-10 px-4 bg-white dark:bg-background-dark">
<span class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-1">Enter Amount</span>
<div class="flex items-center gap-1">
<span class="text-4xl font-bold text-primary">$</span>
<input autofocus="" class="text-[#111318] dark:text-white tracking-tight text-[48px] font-bold leading-tight text-center border-none focus:ring-0 bg-transparent w-full placeholder:text-gray-200 dark:placeholder:text-gray-700" placeholder="0.00" step="0.01" type="number"/>
</div>
</div>
<!-- Category Selection -->
<div class="px-4 py-4">
<h3 class="text-[#111318] dark:text-white text-base font-bold leading-tight tracking-[-0.015em] pb-3">Category</h3>
<div class="grid grid-cols-4 gap-3">
<!-- Category Item: Food (Active) -->
<div class="flex flex-col items-center gap-2">
<div class="flex size-14 items-center justify-center rounded-xl bg-primary text-white shadow-md shadow-primary/20">
<span class="material-symbols-outlined">restaurant</span>
</div>
<span class="text-xs font-semibold text-primary">Food</span>
</div>
<!-- Category Item: Transport -->
<div class="flex flex-col items-center gap-2">
<div class="flex size-14 items-center justify-center rounded-xl bg-background-light dark:bg-gray-800 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-gray-700">
<span class="material-symbols-outlined">directions_car</span>
</div>
<span class="text-xs font-medium text-gray-500">Transport</span>
</div>
<!-- Category Item: Shopping -->
<div class="flex flex-col items-center gap-2">
<div class="flex size-14 items-center justify-center rounded-xl bg-background-light dark:bg-gray-800 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-gray-700">
<span class="material-symbols-outlined">shopping_bag</span>
</div>
<span class="text-xs font-medium text-gray-500">Shopping</span>
</div>
<!-- Category Item: Bills -->
<div class="flex flex-col items-center gap-2">
<div class="flex size-14 items-center justify-center rounded-xl bg-background-light dark:bg-gray-800 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-gray-700">
<span class="material-symbols-outlined">receipt_long</span>
</div>
<span class="text-xs font-medium text-gray-500">Bills</span>
</div>
</div>
</div>
<!-- Form Fields -->
<div class="px-4 space-y-5 mt-4">
<!-- Merchant Name -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-gray-700 dark:text-gray-300 px-1">Merchant Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xl">store</span>
<input class="w-full pl-10 pr-4 py-3.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800/50 text-[#111318] dark:text-white focus:border-primary focus:ring-1 focus:ring-primary transition-all" placeholder="Where did you spend?" type="text"/>
</div>
</div>
<!-- Date Selection -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-gray-700 dark:text-gray-300 px-1">Date</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xl">calendar_today</span>
<input class="w-full pl-10 pr-4 py-3.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800/50 text-[#111318] dark:text-white focus:border-primary focus:ring-1 focus:ring-primary transition-all" type="date" value="2023-10-27"/>
</div>
</div>
<!-- Note -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-gray-700 dark:text-gray-300 px-1">Note (Optional)</label>
<div class="relative">
<textarea class="w-full p-4 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800/50 text-[#111318] dark:text-white focus:border-primary focus:ring-1 focus:ring-primary transition-all resize-none" placeholder="Add a description..." rows="3"></textarea>
</div>
</div>
</div>
</div>
<!-- Sticky Footer Action -->
<div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-white via-white dark:from-background-dark dark:via-background-dark to-transparent">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/25 flex items-center justify-center gap-2 transition-transform active:scale-[0.98]">
<span class="material-symbols-outlined">check_circle</span>
                Save Expense
            </button>
</div>
</div>
</body></html>
